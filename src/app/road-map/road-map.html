<div #roadmapContainer 
     class="flex flex-col w-full items-center justify-center bg-[#1A3263] py-20 overflow-hidden"
     [class.is-visible]="isVisible">
    
    <h2 class="text-4xl font-bold text-center text-[#E8EDF2] mb-16 transition-opacity duration-1000"
        [style.opacity]="isVisible ? 1 : 0">
        Hoja de ruta para tu negocio
    </h2>

    <svg width="600" height="850" viewBox="0 0 600 850" fill="none" xmlns="http://www.w3.org/2000/svg" class="max-w-full h-auto">
        <style>
            /* Animación de trazado de línea */
            .main-line { 
                stroke-dasharray: 1200; 
                stroke-dashoffset: 1200; 
                opacity: 0;
            }
            .is-visible .main-line {
                opacity: 1;
                animation: drawLine 3.5s ease-in-out forwards;
            }

            /* Animación de puntos (Pop desde el centro) */
            .checkpoint-dot { 
                opacity: 0; 
                transform: scale(0);
                transform-origin: center;
                transform-box: fill-box;
            }
            .is-visible .checkpoint-dot {
                animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            }

            /* Animación de texto (Fade in) */
            .checkpoint-text { opacity: 0; }
            .is-visible .checkpoint-text {
                animation: fadeIn 0.5s ease-out forwards;
            }

            @keyframes drawLine { to { stroke-dashoffset: 0; } }
            @keyframes popIn { to { opacity: 1; transform: scale(1); } }
            @keyframes fadeIn { to { opacity: 1; } }

            /* Delays sincronizados con la línea suavizada */
            .is-visible .d1 { animation-delay: 0s; }
            .is-visible .d2 { animation-delay: 0.5s; }
            .is-visible .d3 { animation-delay: 1.1s; }
            .is-visible .d4 { animation-delay: 1.7s; }
            .is-visible .d5 { animation-delay: 2.3s; }
            .is-visible .d6 { animation-delay: 2.9s; }
            .is-visible .d7 { animation-delay: 3.5s; }
        </style>

        <!-- LÍNEA SUTILMENTE ONDULADA (Less wavy) -->
        <!-- La variación en X es de solo 30px para evitar curvas pronunciadas -->
        <path class="main-line" 
              d="M200 50 
                 C 200 110, 230 110, 230 170 
                 C 230 230, 170 230, 170 290 
                 C 170 350, 230 350, 230 410 
                 C 230 470, 170 470, 170 530 
                 C 170 590, 230 590, 230 650 
                 C 230 710, 200 710, 200 770" 
              stroke="#3A86FF" stroke-width="3" stroke-linecap="round" fill="none" />

        <!-- CHECKPOINTS -->
        <g>
            <circle class="checkpoint-dot d1" cx="200" cy="50" r="7" fill="#3A86FF" stroke="white" stroke-width="2"/>
            <text x="260" y="55" class="checkpoint-text d1" fill="white" font-family="Arial" font-size="16">1. Presentación introductoria</text>
        </g>

        <g>
            <circle class="checkpoint-dot d2" cx="230" cy="170" r="7" fill="#3A86FF" stroke="white" stroke-width="2"/>
            <text x="260" y="175" class="checkpoint-text d2" fill="white" font-family="Arial" font-size="16">2. Generación manual de identidad/marca</text>
        </g>

        <g>
            <circle class="checkpoint-dot d3" cx="170" cy="290" r="7" fill="#3A86FF" stroke="white" stroke-width="2"/>
            <text x="260" y="295" class="checkpoint-text d3" fill="white" font-family="Arial" font-size="16">3. Posicionamiento en Google Maps</text>
        </g>

        <g>
            <circle class="checkpoint-dot d4" cx="230" cy="410" r="7" fill="#3A86FF" stroke="white" stroke-width="2"/>
            <text x="260" y="415" class="checkpoint-text d4" fill="white" font-family="Arial" font-size="16">4. Diseño página web</text>
        </g>

        <g>
            <circle class="checkpoint-dot d5" cx="170" cy="530" r="7" fill="#3A86FF" stroke="white" stroke-width="2"/>
            <text x="260" y="535" class="checkpoint-text d5" fill="white" font-family="Arial" font-size="16">5. Desarrollo página web</text>
        </g>

        <g>
            <circle class="checkpoint-dot d6" cx="230" cy="650" r="7" fill="#3A86FF" stroke="white" stroke-width="2"/>
            <text x="260" y="655" class="checkpoint-text d6" fill="white" font-family="Arial" font-size="16">6. Posicionamiento en Google</text>
        </g>

        <g>
            <circle class="checkpoint-dot d7" cx="200" cy="770" r="9" fill="#00D1FF" stroke="white" stroke-width="2"/>
            <text x="260" y="775" class="checkpoint-text d7" fill="#00D1FF" font-family="Arial" font-size="16" font-weight="bold">7. Presentación y entrega</text>
        </g>
    </svg>
</div>
