<section aria-labelledby="titulo-hoja-de-ruta" class="bg-[#1A3263]">
  <div
    #roadmapContainer
    class="relative mx-auto flex max-w-5xl flex-col items-center overflow-hidden px-4 py-16 sm:py-20 lg:py-24"
    [class.is-visible]="isVisible"
  >
    <div
      class="pointer-events-none absolute right-0 top-1/4 h-48 w-48 rounded-full bg-[#3852B4]/15 blur-3xl"
      aria-hidden="true"
    ></div>

    <h2
      id="titulo-hoja-de-ruta"
      class="relative mb-4 max-w-2xl text-balance text-center text-3xl font-bold tracking-tight text-[#E8EDF2] transition-opacity duration-1000 sm:text-4xl md:text-5xl"
      [style.opacity]="isVisible ? 1 : 0"
    >
      Hoja de ruta para tu negocio
    </h2>
    <p
      class="relative mb-12 max-w-xl text-center text-sm text-[#E8EDF2]/70 transition-opacity duration-1000 sm:text-base"
      [style.opacity]="isVisible ? 1 : 0"
    >
      Del primer contacto a la entrega: un proceso claro en siete pasos.
    </p>

    <div
      fade-in-view
      class="relative w-full max-w-3xl overflow-hidden rounded-3xl border border-white/10 bg-gradient-to-br from-[#0f2747]/95 via-[#152d52]/95 to-[#0a3d4d]/95 p-4 shadow-[0_24px_64px_-12px_rgba(0,0,0,0.45)] sm:p-8"
    >
      <div
        class="pointer-events-none absolute -right-12 top-0 h-32 w-32 rounded-full bg-cyan-400/10 blur-2xl"
        aria-hidden="true"
      ></div>
      <svg
        width="600"
        height="850"
        viewBox="0 0 600 850"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        class="relative z-[1] mx-auto h-auto max-w-full"
      >
        <title>Hoja de ruta del proyecto en siete etapas, desde la presentación hasta la entrega</title>
        <style>
          .main-line {
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            opacity: 0;
          }
          .is-visible .main-line {
            opacity: 1;
            animation: drawLine 3.5s ease-in-out forwards;
          }
          .checkpoint-dot {
            opacity: 0;
            transform: scale(0);
            transform-origin: center;
            transform-box: fill-box;
          }
          .is-visible .checkpoint-dot {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
          }
          .checkpoint-text {
            opacity: 0;
          }
          .is-visible .checkpoint-text {
            animation: fadeIn 0.5s ease-out forwards;
          }
          @keyframes drawLine {
            to {
              stroke-dashoffset: 0;
            }
          }
          @keyframes popIn {
            to {
              opacity: 1;
              transform: scale(1);
            }
          }
          @keyframes fadeIn {
            to {
              opacity: 1;
            }
          }
          .is-visible .d1 {
            animation-delay: 0s;
          }
          .is-visible .d2 {
            animation-delay: 0.5s;
          }
          .is-visible .d3 {
            animation-delay: 1.1s;
          }
          .is-visible .d4 {
            animation-delay: 1.7s;
          }
          .is-visible .d5 {
            animation-delay: 2.3s;
          }
          .is-visible .d6 {
            animation-delay: 2.9s;
          }
          .is-visible .d7 {
            animation-delay: 3.5s;
          }
        </style>

        <path
          class="main-line"
          d="M200 50 
                 C 200 110, 230 110, 230 170 
                 C 230 230, 170 230, 170 290 
                 C 170 350, 230 350, 230 410 
                 C 230 470, 170 470, 170 530 
                 C 170 590, 230 590, 230 650 
                 C 230 710, 200 710, 200 770"
          stroke="#3A86FF"
          stroke-width="3"
          stroke-linecap="round"
          fill="none"
        />

        <g>
          <circle class="checkpoint-dot d1" cx="200" cy="50" r="7" fill="#3A86FF" stroke="white" stroke-width="2" />
          <text
            x="260"
            y="55"
            class="checkpoint-text d1"
            fill="white"
            font-family="Roboto, Arial, sans-serif"
            font-size="22"
          >
            1. Presentación introductoria
          </text>
        </g>

        <g>
          <circle class="checkpoint-dot d2" cx="230" cy="170" r="7" fill="#3A86FF" stroke="white" stroke-width="2" />
          <text
            x="260"
            y="175"
            class="checkpoint-text d2"
            fill="white"
            font-family="Roboto, Arial, sans-serif"
            font-size="22"
          >
            2. Generación manual de identidad/marca
          </text>
        </g>

        <g>
          <circle class="checkpoint-dot d3" cx="170" cy="290" r="7" fill="#3A86FF" stroke="white" stroke-width="2" />
          <text
            x="260"
            y="295"
            class="checkpoint-text d3"
            fill="white"
            font-family="Roboto, Arial, sans-serif"
            font-size="22"
          >
            3. Posicionamiento en Google Maps
          </text>
        </g>

        <g>
          <circle class="checkpoint-dot d4" cx="230" cy="410" r="7" fill="#3A86FF" stroke="white" stroke-width="2" />
          <text
            x="260"
            y="415"
            class="checkpoint-text d4"
            fill="white"
            font-family="Roboto, Arial, sans-serif"
            font-size="22"
          >
            4. Diseño página web
          </text>
        </g>

        <g>
          <circle class="checkpoint-dot d5" cx="170" cy="530" r="7" fill="#3A86FF" stroke="white" stroke-width="2" />
          <text
            x="260"
            y="535"
            class="checkpoint-text d5"
            fill="white"
            font-family="Roboto, Arial, sans-serif"
            font-size="22"
          >
            5. Desarrollo página web
          </text>
        </g>

        <g>
          <circle class="checkpoint-dot d6" cx="230" cy="650" r="7" fill="#3A86FF" stroke="white" stroke-width="2" />
          <text
            x="260"
            y="655"
            class="checkpoint-text d6"
            fill="white"
            font-family="Roboto, Arial, sans-serif"
            font-size="22"
          >
            6. Posicionamiento en Google
          </text>
        </g>

        <g>
          <circle class="checkpoint-dot d7" cx="200" cy="770" r="9" fill="#00D1FF" stroke="white" stroke-width="2" />
          <text
            x="260"
            y="775"
            class="checkpoint-text d7"
            fill="#00D1FF"
            font-family="Roboto, Arial, sans-serif"
            font-size="22"
            font-weight="bold"
          >
            7. Presentación y entrega
          </text>
        </g>
      </svg>
    </div>
  </div>
</section>
