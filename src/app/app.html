<main class="main min-h-screen bg-[#E8EDF2] text-slate-900 antialiased">
  <section aria-labelledby="titulo-inicio" class="relative">
    <div class="fixed bottom-6 right-4 z-50 flex items-stretch gap-0 sm:bottom-8 sm:right-6">
      <span
        class="hidden items-center rounded-l-2xl border border-r-0 border-white/20 bg-green-600/95 px-4 py-3 text-sm font-semibold text-white shadow-lg backdrop-blur-sm sm:flex"
      >
        ¡Contáctanos!
      </span>
      <a
        [href]="whatsappLink"
        target="_blank"
        rel="noopener noreferrer"
        class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full border border-green-500/30 bg-green-600 text-white shadow-[0_12px_40px_-4px_rgba(22,163,74,0.55)] transition hover:bg-green-500 hover:shadow-[0_16px_44px_-4px_rgba(22,163,74,0.65)] focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-offset-2 focus:ring-offset-[#E8EDF2] sm:h-14 sm:w-14 sm:rounded-l-none"
        aria-label="Contáctanos en WhatsApp"
      >
        <i class="fa-brands fa-whatsapp inline-block text-[2.75rem] animate-vibe" aria-hidden="true"></i>
      </a>
    </div>

    <div
      class="relative flex min-h-screen w-full items-center justify-center bg-cover bg-center bg-no-repeat bg-fixed bg-attachment-fixed"
      style="background-image: url('./thumbnail.png')"
    >
      <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-black/55 to-[#1A3263]/85"></div>
      <div class="relative z-10 mx-auto w-full max-w-4xl px-6 py-28 sm:py-36">
        <div class="mb-10 flex justify-center">
          <div
            class="rounded-3xl border border-white/15 bg-white/5 p-6 shadow-[0_20px_60px_-15px_rgba(0,0,0,0.45)] backdrop-blur-md sm:p-8"
          >
            <img
              src="./LOGO.svg"
              width="200"
              height="80"
              fetchpriority="high"
              alt="Digital Portal — agencia de SEO y diseño web en Chile"
              class="mx-auto drop-shadow-md"
            />
          </div>
        </div>
        <p
          class="mb-4 text-center text-xs font-semibold uppercase tracking-[0.35em] text-cyan-200/90 sm:text-sm"
        >
          SEO · Web · Google Maps
        </p>
        <h1
          id="titulo-inicio"
          class="text-balance text-center text-2xl font-bold leading-snug text-white drop-shadow-sm sm:text-3xl md:text-4xl lg:text-[2.65rem] lg:leading-tight"
        >
          Posiciona tu negocio en Google y aumenta tu visibilidad online
        </h1>
      </div>
      <svg
        viewBox="0 0 1440 100"
        preserveAspectRatio="none"
        class="pointer-events-none absolute bottom-0 left-0 z-20 h-20 w-full fill-[#1A3263]"
        aria-hidden="true"
      >
        <path d="M0,50 C480,110 960,-50 1440,50 L1440,100 L0,100 Z"></path>
      </svg>
    </div>
  </section>

  <app-start></app-start>
  <app-prices></app-prices>
  <app-services></app-services>
  <app-benefits></app-benefits>
  <app-road-map></app-road-map>
  <app-our-clients></app-our-clients>
  <app-footer></app-footer>
</main>
<router-outlet />
